<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groundsource Tanzania Web Map</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <p class="eyebrow">Interactive Atlas</p>
      <h1>Groundsource Tanzania</h1>
      <p class="intro">
        Explore mapped polygons from the Groundsource Tanzania dataset. Filter by date,
        inspect area values, and zoom to the full extent of the collection.
      </p>

      <section class="controls">
        <label for="start-date-filter">Start date filter</label>
        <input id="start-date-filter" type="date">
        <label for="end-date-filter">End date filter</label>
        <input id="end-date-filter" type="date">
        <button id="reset-filter" type="button">Show all features</button>
        <button id="zoom-all" type="button">Zoom to dataset</button>
        <button id="download-geojson" type="button">Download GeoJSON</button>
        <button id="download-shapefile" type="button">Download ZIP Shapefile</button>
      </section>

      <section class="stats">
        <div class="stat">
          <span class="stat-label">Visible features</span>
          <strong id="visible-count">0</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Total features</span>
          <strong id="total-count">0</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Date range</span>
          <strong id="date-range">Loading...</strong>
        </div>
      </section>

      <p id="status" class="status">Loading dataset...</p>
    </aside>

    <main class="map-wrap">
      <div id="map" aria-label="Map of Groundsource Tanzania data"></div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/@mapbox/shp-write@0.4.3/shpwrite.js"></script>
  <script src="./app.js"></script>
</body>
</html>
